name: 发布早舟科技官网

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 获取网站文件
        uses: actions/checkout@v6
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: 打包网站
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
      - name: 发布网站
        id: deployment
        uses: actions/deploy-pages@v4
